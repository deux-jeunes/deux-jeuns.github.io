  #history-btn {
    position:fixed; top:14px; right:14px;
    background:rgba(0,0,0,0.55); color:#fff;
    border:2px solid rgba(255,255,255,0.6); border-radius:10px;
    padding:8px 18px; font-size:14px; font-weight:700; cursor:pointer;
    z-index:100; backdrop-filter:blur(6px);
    letter-spacing:1px; transition:background .2s;
  }
  #history-btn:hover { background:rgba(0,0,0,0.8); }

  /* History modal */
  #history-modal {
    display:none; position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,0.6); align-items:center; justify-content:center;
  }
  #history-modal.show { display:flex; }
  #history-box {
    background:#fff; border:3px solid #c8d400; border-radius:16px;
    padding:24px 32px; max-width:90vw; max-height:80vh; overflow-y:auto;
    min-width:320px;
  }
  #history-box h2 { color:#333; text-align:center; margin-bottom:16px; font-size:20px; }
  .history-entry {
    display:flex; gap:10px; align-items:center; margin-bottom:14px;
    border-bottom:1px solid #eee; padding-bottom:12px;
  }
  .history-entry span { color:#666; font-size:13px; min-width:28px; font-weight:700; }
  .history-entry img { height:48px; width:auto; object-fit:contain; background:transparent; }
  #history-close {
    display:block; margin:12px auto 0; padding:8px 28px;
    background:#c8d400; color:#222; border:none; border-radius:8px;
    cursor:pointer; font-size:14px; font-weight:900;
  }

  /* Slot area - no boxes, just images floating */
  #slot-area {
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:10;
  }
  .slot-img {
    height:256px;
    width:auto;
    display:none;
    object-fit:contain;
    background:transparent;
    image-rendering:auto;
  }
  .slot-img.visible { display:block; }

  /* Buttons */
  #start-btn, #retry-btn {
    margin-top:36px;
    padding:14px 60px; font-size:22px; font-weight:900;
    border:none; border-radius:50px; cursor:pointer;
    letter-spacing:3px; position:relative; z-index:10;
    transition: transform .1s, box-shadow .2s;
  }
  #start-btn {
    background:#c8d400; color:#111;
    box-shadow:0 4px 24px rgba(0,0,0,0.4);
  }
  #start-btn:hover { transform:scale(1.05); }
  #retry-btn {
    background:#111; color:#c8d400;
    border:3px solid #c8d400;
    box-shadow:0 4px 24px rgba(0,0,0,0.3);
    display:none;
  }
  #retry-btn:hover { transform:scale(1.05); }

  #confetti-canvas {
    position:fixed; inset:0; pointer-events:none; z-index:50;
  }
</style>
</head>

  tick();

  if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }

// ─── Spin ─────────────────────────────────────────────
function spinOne(key, imgEl, callback) {
  const set = SETS[key];
  const duration = 2000;
  const intervalMs = 90;
  let elapsed = 0;
  playSlotSound();
  const timer = setInterval(() => {
    imgEl.src = IMGS[set[Math.floor(Math.random() * set.length)]];
    imgEl.classList.add('visible');
    elapsed += intervalMs;
    if (elapsed >= duration) {
      clearInterval(timer);
      stopSlotSound();
      const finalKey = set[Math.floor(Math.random() * set.length)];
      imgEl.src = IMGS[finalKey];
      imgEl.classList.add('visible');
      currentResult[key] = finalKey;
      setTimeout(callback, 350);
    }
  }, intervalMs);
}

function runSpins() {
  if (spinning) return;
  spinning = true;
  currentResult = {};
  ORDER.forEach(k => {
    const img = document.getElementById('img-'+k);
    img.src = ''; img.classList.remove('visible');
  });
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('retry-btn').style.display = 'none';

  function spinNext(idx) {
    if (idx >= ORDER.length) {
      history.push({...currentResult});
      playWinSound();
      launchConfetti();
      setTimeout(() => {
        document.getElementById('retry-btn').style.display = 'inline-block';
        spinning = false;
      }, 2000);
      return;
    }
    const k = ORDER[idx];
    spinOne(k, document.getElementById('img-'+k), () => spinNext(idx+1));
  }
  spinNext(0);
}

// ─── Confetti ─────────────────────────────────────────
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [], animId = null;

function launchConfetti() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  particles = [];
  const colors = ['#c8d400','#111','#fff','#ff4444','#00ccff','#ff88cc','#ffaa00'];
  const cx = canvas.width/2, cy = canvas.height/2;
  for (let i=0; i<240; i++) {
    const a = Math.random()*Math.PI*2;
    const sp = 5 + Math.random()*12;
    particles.push({
      x:cx, y:cy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - 5,
      rot:Math.random()*360, rotV:(Math.random()-.5)*9,
      w:7+Math.random()*10, h:4+Math.random()*6,
      color:colors[Math.floor(Math.random()*colors.length)],
      alpha:1, grav:0.28+Math.random()*0.18
    });
  }
  if (animId) cancelAnimationFrame(animId);
  drawConfetti();
}
function drawConfetti() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let alive = false;
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.grav;
    p.vx*=0.99; p.rot+=p.rotV; p.alpha-=0.007;
    if (p.alpha>0) {
      alive=true;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.alpha);
      ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    }
  });
  if (alive) animId=requestAnimationFrame(drawConfetti);
  else ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ─── History ──────────────────────────────────────────
function showHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  if (!history.length) {
    list.innerHTML = '<p style="color:#999;text-align:center;padding:12px">아직 기록이 없습니다</p>';
  } else {
    history.forEach((r,i) => {
      const div = document.createElement('div');
      div.className = 'history-entry';
      div.innerHTML = '<span>#'+(i+1)+'</span>';
      ORDER.forEach(k => {
        if (r[k]) {
          const img = document.createElement('img');
          img.src = IMGS[r[k]]; div.appendChild(img);
        }
      });
      list.appendChild(div);
    });
  }
  document.getElementById('history-modal').classList.add('show');
}

document.getElementById('history-btn').onclick = showHistory;
document.getElementById('history-close').onclick = () => document.getElementById('history-modal').classList.remove('show');
document.getElementById('history-modal').onclick = e => {
  if (e.target===document.getElementById('history-modal'))
    document.getElementById('history-modal').classList.remove('show');
};
document.getElementById('start-btn').onclick = () => { initAudio(); runSpins(); };
document.getElementById('retry-btn').onclick = () => { initAudio(); runSpins(); };
window.addEventListener('resize', () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
</script>
